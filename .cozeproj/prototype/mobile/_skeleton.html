<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- 字体（按需，系统字体时省略；只能用 Google 字体，CSS 地址前缀：https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google） -->
  <!-- <link href="https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google/google-all-fonts.css" rel="stylesheet"/> -->

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色 === */
      --color-primary:              #D98C9A;
      --color-primary-container:    #FDE2E4;
      --color-on-primary:           #ffffff;
      /* === 背景 / 表面（温暖手作色调系统） === */
      --color-background:                 #F8EDEB;
      --color-surface-container-lowest:   #FFFFFF;
      --color-surface:                    #FFF7F2;
      --color-surface-container:          #FDE2E4;
      --color-surface-container-high:     #FFF1DE;
      --color-surface-container-highest:  #E8C9C4;
      /* === 文字 === */
      --color-on-surface:           #2F2523;
      --color-on-surface-variant:   #7A8061;
      /* === 功能色 === */
      --color-success:  #7A8061;
      --color-error:    #C77763;
      --color-warning:  #D98C9A;
      /* === 边框 === */
      --color-outline:          #3A2A28;
      --color-outline-variant:  #E8C9C4;
      /* === 圆角 === */
      --radius-sm:   0.5rem;
      --radius-md:   0.75rem;
      --radius-lg:   1rem;
      --radius-xl:   1.25rem;
      --radius-2xl:  1.5rem;
      --radius-full: 9999px;
      /* === 阴影 === */
      --shadow-card:   0 4px 12px rgba(0,0,0,0.06);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.08);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.12);
      /* === 字体 === */
      --font-sans: system-ui, sans-serif;
    }
  </style>

  <style>
    body {
      min-height: max(812px, 100dvh);
      font-family: system-ui, sans-serif;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans">

  <!-- @nav:start 导航组件，不需要的页面则不要复制此段（从 @nav:start 到 @nav:end） -->
  <header class="bg-background sticky top-0 z-40 h-14 flex items-center justify-between px-4">
    <div class="flex items-center gap-2">
      <i data-lucide="message-circle-heart" class="w-5 h-5 text-primary"></i>
      <h1 class="text-base font-semibold text-on-surface">回复小助手</h1>
    </div>
    <button class="w-10 h-10 flex items-center justify-center text-on-surface-variant rounded-full hover:bg-surface-container active:bg-surface-container-high transition-colors">
      <i data-lucide="info" class="w-5 h-5"></i>
    </button>
  </header>
  <!-- @nav:end 导航组件，不需要的页面则不要复制此段 -->

  <main class="flex-1 overflow-y-auto pb-[env(safe-area-inset-bottom)]">
    <!-- @main-content:start -->
    <!-- @main-content:end -->
  </main>

  <script>lucide.createIcons();</script>
</body>

</html>
